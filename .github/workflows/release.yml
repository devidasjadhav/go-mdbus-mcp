name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for manual release'
        required: true
        type: string

env:
  GO_VERSION: '1.23'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run Go vet
        run: go vet ./...

  build:
    name: Build
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: modbus-server-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary_name: modbus-server-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary_name: modbus-server-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary_name: modbus-server-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.binary_name }} main.go

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          # Get commits since last tag
          if [ "$LATEST_TAG" != "${{ steps.tag.outputs.tag }}" ]; then
            CHANGES=$(git log --pretty=format:"* %s (%h)" $LATEST_TAG..HEAD 2>/dev/null || echo "* Initial release")
          else
            CHANGES="* Release ${{ steps.tag.outputs.tag }}"
          fi

          # Create release notes
          RELEASE_NOTES="## Changes in ${{ steps.tag.outputs.tag }}

          $CHANGES

          ## Assets

          This release includes binaries for multiple platforms:
          - Linux (amd64, arm64)
          - macOS (amd64, arm64)

          ## Installation

          Download the appropriate binary for your platform and make it executable:

          \`\`\`bash
          chmod +x modbus-server-*
          ./modbus-server-linux-amd64 --help
          \`\`\`

          ## Usage

          \`\`\`bash
          ./modbus-server --modbus-ip YOUR_MODBUS_IP --modbus-port YOUR_MODBUS_PORT
          \`\`\`"

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/modbus-server-linux-amd64/modbus-server-linux-amd64
            ./artifacts/modbus-server-linux-arm64/modbus-server-linux-arm64
            ./artifacts/modbus-server-darwin-amd64/modbus-server-darwin-amd64
            ./artifacts/modbus-server-darwin-arm64/modbus-server-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify on Failure
    needs: [test, build, release]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify failure
        run: |
          echo "❌ CI/CD pipeline failed for ${{ github.ref_name }}"
          echo "Check the Actions tab for details: ${{ github.server_url }}/${{ github.repository }}/actions"
